<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 · Uncertainty Banana</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #fff; color: #2a2a2a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; }
  header { padding: 10px 16px; border-bottom: 1px solid #e5e7eb; font-size: 13px; color: #4b5563;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; color: #111; }
  input[type=range] { width: 130px; accent-color: #6b46c1; }
  #view { flex: 1; position: relative; }
  #view canvas { display: block; width: 100%; height: 100%; }
  .k { position:absolute; left:12px; bottom:10px; font-size:12px; color:#6b7280; }
</style>
</head>
<body>
<div id="app">
  <header><h1>8 · Uncertainty on a Lie Group</h1>
    <label>spread σ</label><input id="sig" type="range" min="0" max="1.3" step="0.01" value="0.2">
    <span>drag the mean around · a round Gaussian in the flat tangent space bends into a “banana” on the manifold</span>
  </header>
  <div id="view">
    <div class="k"><b style="color:#38a169">green plane</b> = tangent space (flat, symmetric blob) &nbsp;·&nbsp; <b style="color:#6b46c1">violet dots</b> = the same samples via exp</div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const host=document.getElementById('view');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio); renderer.setClearColor(0xffffff,1); host.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,1,0.1,100);
scene.add(new THREE.AmbientLight(0xffffff,0.9));
const dl=new THREE.DirectionalLight(0xffffff,0.5); dl.position.set(3,5,4); scene.add(dl);
let th=-0.5, ph=1.05, rad=7, mode=null, px, py;
function cam(){ const s=Math.sin(ph); camera.position.set(rad*s*Math.sin(th),rad*Math.cos(ph),rad*s*Math.cos(th)); camera.lookAt(0,0,0); }

const Rr=1.4, E=new THREE.Vector3(1,0,0);
const sphereGeo=new THREE.SphereGeometry(Rr,48,48);
const sphere=new THREE.Mesh(sphereGeo,
  new THREE.MeshStandardMaterial({color:0x7fb3e0,transparent:true,opacity:0.4,metalness:0.1,roughness:0.6}));
sphere.add(new THREE.LineSegments(new THREE.WireframeGeometry(sphereGeo), new THREE.LineBasicMaterial({color:0xcccccc})));
scene.add(sphere);
const planeQ=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1),E);
const plane=new THREE.Mesh(new THREE.PlaneGeometry(4.0, 4.0),
  new THREE.MeshBasicMaterial({color:0x68d391,transparent:true,opacity:0.3,side:THREE.DoubleSide,depthWrite:false}));
plane.position.copy(E).multiplyScalar(Rr); plane.quaternion.copy(planeQ); scene.add(plane);
function planeGrid(size, div, color){
  const pts=[], h=size/2, step=size/div;
  for(let i=0;i<=div;i++){ const t=-h+i*step; pts.push(t,-h,0.003, t,h,0.003, -h,t,0.003, h,t,0.003); }
  const g=new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  return new THREE.LineSegments(g, new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.5 }));
}
plane.add(planeGrid(4.0, 16, 0x66b98c));
const epsM=new THREE.Mesh(new THREE.SphereGeometry(0.05,16,16),new THREE.MeshBasicMaterial({color:0x2f855a}));
epsM.position.copy(E).multiplyScalar(Rr); scene.add(epsM);
const xM=new THREE.Mesh(new THREE.SphereGeometry(0.065,20,20),new THREE.MeshBasicMaterial({color:0xc99a00})); scene.add(xM);
// ---- line/vector thickness (tweak TH) ----
const TH = 0.028;
function setTube(mesh, pts, r){ if (pts.length < 2){ mesh.visible=false; return; } mesh.visible=true;
  const curve = new THREE.CatmullRomCurve3(pts); mesh.geometry.dispose();
  mesh.geometry = new THREE.TubeGeometry(curve, Math.max(4, pts.length), r, 8, false); }
function thickArrow(color, r){ const mat = new THREE.MeshBasicMaterial({ color });
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(r, r, 1, 12), mat);
  const head  = new THREE.Mesh(new THREE.ConeGeometry(r*2.4, r*6, 16), mat);
  const g = new THREE.Group(); g.add(shaft, head);
  g.set = (origin, dir, len) => { const hl = r*6, sl = Math.max(0.0001, len - hl);
    shaft.scale.y = sl; shaft.position.set(0, sl/2, 0); head.position.set(0, sl + hl/2, 0);
    g.position.copy(origin); g.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize()); };
  g.setColor = c => mat.color.set(c); return g; }
const geoTube=new THREE.Mesh(new THREE.BufferGeometry(), new THREE.MeshBasicMaterial({color:0xc99a00})); scene.add(geoTube);
// tangent vector τ from ε to the mean's tangent point
const tauArrow=thickArrow(0x6b46c1, TH); scene.add(tauArrow);
const tipM=new THREE.Mesh(new THREE.SphereGeometry(0.05,16,16), new THREE.MeshBasicMaterial({color:0x6b46c1})); scene.add(tipM);

function expAt(t){ const n=t.length(); if(n<1e-9) return E.clone();
  return E.clone().multiplyScalar(Math.cos(n)).add(t.clone().multiplyScalar(Math.sin(n)/n)); }
function logMap(P){ const d=Math.acos(THREE.MathUtils.clamp(P.dot(E),-1,1));
  const pr=P.clone().addScaledVector(E,-P.dot(E)); if(pr.length()<1e-9) return new THREE.Vector3(); return pr.normalize().multiplyScalar(d); }

// fixed standard-normal draws
function randn(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
const NS=1000, G=Array.from({length:NS},()=>({a:randn(),b:randn()}));
const ptMat=c=>new THREE.PointsMaterial({color:c,size:0.05,sizeAttenuation:true,transparent:true,opacity:0.95});
const ptsTan=new THREE.Points(new THREE.BufferGeometry(),ptMat(0x9f7aea)); ptsTan.renderOrder=2; scene.add(ptsTan);
const ptsMan=new THREE.Points(new THREE.BufferGeometry(),ptMat(0x6b46c1)); ptsMan.renderOrder=2; scene.add(ptsMan);

let X=new THREE.Vector3(0,0.7,0.5).normalize();
function update(){
  const tau=logMap(X), n=tau.length();
  const bp=E.clone().multiplyScalar(Rr);
  const dir=n<1e-9? new THREE.Vector3(0,1,0):tau.clone().normalize();
  const tip=bp.clone().addScaledVector(dir,n*Rr);
  tauArrow.set(bp, dir, Math.max(0.001, n*Rr));
  tipM.position.copy(tip);
  // geodesic
  const N = 40;
  const pts=[]; for(let i=0;i<=N;i++) pts.push(expAt(tau.clone().multiplyScalar(i/N)).multiplyScalar(Rr));
  setTube(geoTube, pts, TH);
  xM.position.copy(X).multiplyScalar(Rr);
  // tangent basis at E
  const u=new THREE.Vector3(0,1,0), v=new THREE.Vector3(0,0,1);
  const k=+document.getElementById('sig').value, S=0.42;
  const tanP=[], manP=[];
  for(const g of G){ const d=u.clone().multiplyScalar(k*S*g.a).addScaledVector(v,k*S*g.b);
    const t=tip.clone().addScaledVector(d,Rr); tanP.push(t.x,t.y,t.z);
    const m=expAt(tau.clone().add(d)).multiplyScalar(Rr*1.01); manP.push(m.x,m.y,m.z); }
  ptsTan.geometry.setAttribute('position',new THREE.Float32BufferAttribute(tanP,3));
  ptsMan.geometry.setAttribute('position',new THREE.Float32BufferAttribute(manP,3));
}
const ray=new THREE.Raycaster();
function ndc(e){ const r=host.getBoundingClientRect(); return new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1,-((e.clientY-r.top)/r.height)*2+1); }
renderer.domElement.addEventListener('pointerdown', e=>{ ray.setFromCamera(ndc(e),camera);
  if(ray.intersectObject(sphere).length){ mode='pt'; move(e); } else { mode='orbit'; px=e.clientX; py=e.clientY; } });
window.addEventListener('pointermove', e=>{ if(mode==='orbit'){ th-=(e.clientX-px)*0.008; ph=Math.min(3.0,Math.max(0.15,ph-(e.clientY-py)*0.008)); px=e.clientX; py=e.clientY; cam(); } else if(mode==='pt'){ move(e); } });
window.addEventListener('pointerup', ()=>mode=null);
renderer.domElement.addEventListener('wheel', e=>{ e.preventDefault(); rad=Math.min(9,Math.max(3,rad*(1+Math.sign(e.deltaY)*0.08))); cam(); },{passive:false});
function move(e){ ray.setFromCamera(ndc(e),camera); const h=ray.intersectObject(sphere); if(h.length){ X.copy(h[0].point).normalize(); update(); } }
document.getElementById('sig').addEventListener('input', update);
function resize(){ const r=host.getBoundingClientRect(); renderer.setSize(r.width,r.height); camera.aspect=r.width/r.height; camera.updateProjectionMatrix(); }
window.addEventListener('resize', resize);
function tick(){ requestAnimationFrame(tick); renderer.render(scene,camera); }
cam(); resize(); update(); tick();
</script>
</body>
</html>
