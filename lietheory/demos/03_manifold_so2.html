<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 · The Manifold — SO(2) &amp; SO(3)</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #fff; color: #2a2a2a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; }
  #banner { padding: 11px 18px; border-bottom: 1px solid #e5e7eb; background: #fafbfc;
    font-size: 14px; color: #4b5563; }
  #banner b { color: #111; }
  #main { flex: 1; display: flex; min-height: 0; }
  .panel { flex: 1; min-width: 0; position: relative; }
  .panel + .panel { border-left: 1px solid #e5e7eb; }
  .panel > canvas { display: block; width: 100%; height: 100%; }
  .plabel { position: absolute; top: 10px; left: 12px; font-size: 12px; color: #6b7280;
    text-transform: uppercase; letter-spacing: .7px; pointer-events: none; z-index: 2; }
  .cut { position: absolute; bottom: 10px; left: 10px; z-index: 3;
    background: #fff; border: 1px solid #e3e6ea; border-radius: 8px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .cut .view { width: 90px; height: 90px; display: block; }
  .cut .view canvas { display: block; width: 90px !important; height: 90px !important; }
  .ovl { position: absolute; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
  .tag { position: absolute; transform: translate(-50%, -50%); font: bold 14px "SF Mono", Menlo, monospace;
    color: #2f855a; background: rgba(255,255,255,.72); padding: 0 3px; border-radius: 3px; white-space: nowrap; }
  .tag .katex { font-size: 1.05em; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
</head>
<body>
<div id="app">
  <div id="banner"><b>Each point on a manifold is one group element.</b> Drag the point on each manifold — the cutaway (bottom-left) shows the coordinate frame it represents.</div>
  <div id="main">
    <div class="panel" id="so2">
      <div class="plabel">SO(2) — the set of all 2D rotations. Manifold represented as a circle.</div>
      <canvas id="c2"></canvas>
      <div class="ovl" id="ovl2"></div>
      <div class="cut"><div class="view"><canvas id="cut2"></canvas></div></div>
    </div>
    <div class="panel" id="so3">
      <div class="plabel">SO(3) — the set of all 3D rotations. Manifold represented as a sphere.</div>
      <div class="ovl" id="ovl3"></div>
      <div class="cut"><div class="view" id="cut3"></div></div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== shared 2D arrow (correct arrowhead) =====
function arrow2(cx, ox, oy, dx, dy, col, w, lab) {
  cx.strokeStyle = col; cx.fillStyle = col; cx.lineWidth = w;
  cx.beginPath(); cx.moveTo(ox, oy); cx.lineTo(ox+dx, oy-dy); cx.stroke();
  const a = Math.atan2(-dy, dx), h = 9, tx = ox+dx, ty = oy-dy;
  cx.beginPath(); cx.moveTo(tx, ty);
  cx.lineTo(tx-h*Math.cos(a-.4), ty-h*Math.sin(a-.4));
  cx.lineTo(tx-h*Math.cos(a+.4), ty-h*Math.sin(a+.4)); cx.closePath(); cx.fill();
  if (lab){ cx.font = '12px monospace'; cx.fillText(lab, tx+7, ty-5); }
}
function fitCanvas(cv){ const r = cv.getBoundingClientRect(), dpr = devicePixelRatio||1;
  cv.width = r.width*dpr; cv.height = r.height*dpr; const c = cv.getContext('2d');
  c.setTransform(dpr,0,0,dpr,0,0); return { c, W: r.width, H: r.height }; }
// draw a 2D coordinate frame rotated by theta (reference faint + rotated coloured)
function drawFrame2D(c, W, H, theta) {
  c.clearRect(0,0,W,H); const ox = W/2, oy = H/2, L = Math.min(W,H)*0.34;
  arrow2(c, ox, oy, L, 0, '#e2e8f0', 2); arrow2(c, ox, oy, 0, L, '#e2e8f0', 2);
  const ct = Math.cos(theta), st = Math.sin(theta);
  arrow2(c, ox, oy, L*ct, L*st, '#2b6cb0', 2.6, 'e₁');
  arrow2(c, ox, oy, -L*st, L*ct, '#2f855a', 2.6, 'e₂');
}
// KaTeX-rendered floating label
function mathTag(container, latex, color){
  const d = document.createElement('div'); d.className = 'tag'; d.style.color = color;
  if (window.katex) { try { katex.render(latex, d, { throwOnError:false }); } catch(e){ d.textContent = latex; } }
  else d.textContent = latex;
  container.appendChild(d); return d;
}
// ============ SO(2) panel ============
let theta = 0.9;
const c2 = document.getElementById('c2'), cut2 = document.getElementById('cut2');
const ovl2 = document.getElementById('ovl2');
const t2E = mathTag(ovl2, '\\varepsilon', '#2f855a');
const t2X = mathTag(ovl2, 'X', '#dd6b20');
function drawSO2() {
  const { c, W, H } = fitCanvas(c2);
  const R = Math.min(W, H)*0.32, ox = W/2, oy = H/2;
  c.clearRect(0,0,W,H);
  c.strokeStyle = '#d1d5db'; c.lineWidth = 2; c.beginPath(); c.arc(ox,oy,R,0,7); c.stroke();
  // identity + arc
  c.fillStyle = '#2f855a'; c.beginPath(); c.arc(ox+R, oy, 5, 0, 7); c.fill();
  c.strokeStyle = '#dd6b20'; c.lineWidth = 3; c.beginPath(); c.arc(ox,oy,R, 0, -theta, theta>0); c.stroke();
  const px = ox+R*Math.cos(theta), py = oy-R*Math.sin(theta);
  c.strokeStyle = '#e5b299'; c.lineWidth = 1.5; c.beginPath(); c.moveTo(ox,oy); c.lineTo(px,py); c.stroke();
  c.fillStyle = '#dd6b20'; c.beginPath(); c.arc(px,py,7,0,7); c.fill();
  c.fillStyle = '#6b7280'; c.font = '13px monospace';
  c.fillText('θ = ' + theta.toFixed(2), W-84, H-14);
  const cc = fitCanvas(cut2); drawFrame2D(cc.c, cc.W, cc.H, theta);
  t2E.style.left = (ox+R+13)+'px'; t2E.style.top = (oy-11)+'px';
  t2X.style.left = (px+14)+'px';   t2X.style.top = (py-12)+'px';
  c2._geo = { ox, oy, R };
}
let drag2 = false;
function setTheta(e){ const g = c2._geo; if (!g) return; const r = c2.getBoundingClientRect();
  theta = Math.atan2(g.oy-(e.clientY-r.top), (e.clientX-r.left)-g.ox); drawSO2(); }
c2.addEventListener('pointerdown', e => { drag2 = true; setTheta(e); });
window.addEventListener('pointermove', e => { if (drag2) setTheta(e); });
window.addEventListener('pointerup', () => drag2 = false);
// ============ SO(3) panel ============
const host3 = document.getElementById('so3'), cutHost = document.getElementById('cut3'), ovl3 = document.getElementById('ovl3');
const ref = new THREE.Vector3(1,0,0);        // identity direction
let pointDir = new THREE.Vector3(1, 0.55, 0.5).normalize();
// main renderer
const rMain = new THREE.WebGLRenderer({ antialias:true }); rMain.setPixelRatio(devicePixelRatio);
rMain.setClearColor(0xffffff,1); host3.appendChild(rMain.domElement);
const sMain = new THREE.Scene(); const camMain = new THREE.PerspectiveCamera(60,1,0.1,100);
sMain.add(new THREE.AmbientLight(0xffffff,0.9));
const dl1 = new THREE.DirectionalLight(0xffffff,0.5); dl1.position.set(3,5,4); sMain.add(dl1);
const Rr = 1.4;
const sphereGeo = new THREE.SphereGeometry(Rr, 48, 48);
const sphere = new THREE.Mesh(sphereGeo,
  new THREE.MeshStandardMaterial({ color:0x7fb3e0, transparent:true, opacity:0.4, metalness:0.1, roughness:0.6, wireframe:false}));
const wire = new THREE.LineSegments(
  new THREE.WireframeGeometry(sphereGeo),
  new THREE.LineBasicMaterial({ color: 0xcccccc })
);
sphere.add(wire);
sMain.add(sphere);
const epsM = new THREE.Mesh(new THREE.SphereGeometry(0.06,16,16), new THREE.MeshBasicMaterial({color:0x2f855a}));
epsM.position.copy(ref).multiplyScalar(Rr); sMain.add(epsM);
const ptM = new THREE.Mesh(new THREE.SphereGeometry(0.08,20,20), new THREE.MeshBasicMaterial({color:0xdd6b20}));
sMain.add(ptM);
const radial = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
  new THREE.LineBasicMaterial({color:0xe0a878})); sMain.add(radial);
// labels that track the green identity point (ε) and the orange draggable point (X)
const tagId = mathTag(ovl3, '\\varepsilon', '#2f855a');
const tagX = mathTag(ovl3, 'X', '#dd6b20');
// cutaway renderer (coordinate frame)
const rCut = new THREE.WebGLRenderer({ antialias:true, alpha:true }); rCut.setPixelRatio(devicePixelRatio);
rCut.setClearColor(0xffffff,1); cutHost.appendChild(rCut.domElement);
const sCut = new THREE.Scene(); const camCut = new THREE.PerspectiveCamera(60,1,0.1,100);
camCut.position.set(2.4,1.9,2.7); camCut.lookAt(0,0,0);
sCut.add(new THREE.AmbientLight(0xffffff,0.95));
function axis(scene, col, dir, len, parent){ const a = new THREE.ArrowHelper(dir.clone().normalize(), new THREE.Vector3(), len, col, 0.26, 0.16); (parent||scene).add(a); return a; }
axis(sCut, 0xd7dde3, new THREE.Vector3(1,0,0), 1.05); axis(sCut, 0xd7dde3, new THREE.Vector3(0,1,0), 1.05); axis(sCut, 0xd7dde3, new THREE.Vector3(0,0,1), 1.05);
const frame = new THREE.Group(); sCut.add(frame);
axis(sCut, 0xff6b6b, new THREE.Vector3(1,0,0), 1.25, frame);
axis(sCut, 0x51cf66, new THREE.Vector3(0,1,0), 1.25, frame);
axis(sCut, 0x4dabf7, new THREE.Vector3(0,0,1), 1.25, frame);
// orbit for main
let oth=0.5, oph=1.05, orad=4.4, odrag=false, opx, opy, ptDrag=false;
function camU(){ const s=Math.sin(oph); camMain.position.set(orad*s*Math.sin(oth),orad*Math.cos(oph),orad*s*Math.cos(oth)); camMain.lookAt(0,0,0); }
const ray = new THREE.Raycaster();
function ndc(e){ const r=rMain.domElement.getBoundingClientRect(); return new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1, -((e.clientY-r.top)/r.height)*2+1); }
rMain.domElement.addEventListener('pointerdown', e=>{ ray.setFromCamera(ndc(e),camMain);
  if (ray.intersectObject(sphere).length){ ptDrag=true; place(e); } else { odrag=true; opx=e.clientX; opy=e.clientY; } });
window.addEventListener('pointermove', e=>{ if(ptDrag) place(e);
  else if(odrag){ oth-=(e.clientX-opx)*0.008; oph=Math.min(3.0,Math.max(0.15,oph-(e.clientY-opy)*0.008)); opx=e.clientX; opy=e.clientY; camU(); } });
window.addEventListener('pointerup', ()=>{ ptDrag=false; odrag=false; });
rMain.domElement.addEventListener('wheel', e=>{ e.preventDefault(); orad=Math.min(9,Math.max(3,orad*(1+Math.sign(e.deltaY)*0.08))); camU(); }, {passive:false});
function place(e){ ray.setFromCamera(ndc(e),camMain); const h=ray.intersectObject(sphere); if(h.length){ pointDir.copy(h[0].point).normalize(); updateSO3(); } }
function updateSO3(){
  ptM.position.copy(pointDir).multiplyScalar(Rr);
  radial.geometry.setFromPoints([new THREE.Vector3(), pointDir.clone().multiplyScalar(Rr)]);
  radial.geometry.attributes.position.needsUpdate = true;
  frame.quaternion.setFromUnitVectors(ref, pointDir);
}
function placeTag(tag, worldPos){
  const r = host3.getBoundingClientRect();
  const v = worldPos.clone().project(camMain);
  if (v.z > 1) { tag.style.display = 'none'; return; }
  tag.style.display = 'block';
  tag.style.left = ((v.x*0.5+0.5) * r.width) + 'px';
  tag.style.top  = ((-v.y*0.5+0.5) * r.height - 13) + 'px';
}
function placeLabels(){ placeTag(tagId, epsM.position); placeTag(tagX, ptM.position); }
function sizeSO3(){
  const r = host3.getBoundingClientRect(); rMain.setSize(r.width, r.height);
  camMain.aspect = r.width/r.height; camMain.updateProjectionMatrix();
  const cr = cutHost.getBoundingClientRect(); rCut.setSize(cr.width, cr.height);
  camCut.aspect = cr.width/cr.height; camCut.updateProjectionMatrix();
}
function loop(){ requestAnimationFrame(loop); rMain.render(sMain,camMain); rCut.render(sCut,camCut); placeLabels(); }
function resizeAll(){ drawSO2(); sizeSO3(); }
window.addEventListener('resize', resizeAll);
camU(); resizeAll(); updateSO3(); loop();
</script>
</body>
</html>
