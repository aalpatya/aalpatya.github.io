<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tangent space ≅ ℝⁿ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #fff; color: #2a2a2a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; padding: 20px; }
  .grid { display: grid; grid-template-columns: auto auto auto auto;
    grid-template-rows: auto auto auto; column-gap: 20px; row-gap: 22px; align-items: center; }
  .hcell { font-size: 12px; text-transform: uppercase; letter-spacing: .7px;
    text-align: center; font-weight: 700; }
  .hcell.g { color: #2f855a; } .hcell.v { color: #6b46c1; }
  .hcell .hm { text-transform: none; }
  .grp { font-size: 16px; font-weight: 700; color: #374151; }

  /* tangent-space element — green card */
  .tan { min-width: 150px; color: #2f855a; background: #f1faf4; border: 1px solid #b7e4c7;
    border-radius: 9px; padding: 8px 12px; text-align: center; }
  .tan .katex-display { margin: 0; }
  .tan .katex { font-size: 0.92em; }

  /* Cartesian workspace vector — violet card */
  .cart { display: flex; justify-content: center; background: #f7f4fd; border: 1px solid #ddd0f2;
    border-radius: 9px; padding: 7px 9px; }
  .vec { display: inline-flex; align-items: stretch; }
  .vec::before, .vec::after { content: ''; width: 6px; border: 2px solid #6b46c1; }
  .vec::before { border-right: none; border-radius: 4px 0 0 4px; }
  .vec::after { border-left: none; border-radius: 0 4px 4px 0; }
  .vcol { display: flex; flex-direction: column; gap: 5px; padding: 5px 6px; }
  .vcol input { width: 56px; text-align: center; font-family: "SF Mono", Menlo, monospace;
    font-size: 13px; color: #6b46c1; border: 1px solid #e0d6f3; background: #fff;
    border-radius: 6px; padding: 4px 2px; cursor: ew-resize; touch-action: none;
    -moz-appearance: textfield; appearance: textfield; }
  .vcol input::-webkit-outer-spin-button, .vcol input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0; }
  .vcol input:focus { outline: none; border-color: #6b46c1; }

  /* the hat / vee conversion — its own boxed card */
  .iso { justify-self: center; display: flex; flex-direction: column; gap: 16px; min-width: 165px;
    background: #fcfcfe; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.05); }
  .opgrp { display: flex; flex-direction: column; align-items: center; gap: 0; align-self: center; }
  .iso .ar { font-size: 22px; line-height: .9; color: #9aa0a6; display: inline-block; transform: scaleX(3.4); transform-origin: center; }
  .opnm { font-family: "SF Mono", Menlo, monospace; font-size: 15px; color: #4b5563; white-space: nowrap; }
  .opnm .hatvee { color: #000000; }
  .hint { position: fixed; bottom: 12px; left: 0; right: 0; text-align: center;
    font-size: 12.5px; color: #9ca3af; }
</style>
</head>
<body>
  <div class="grid">
    <div class="hcell g" style="grid-column:2; grid-row:1;">Lie Algebra Element&nbsp;<span class="hm" data-tex="\tau^{\wedge}"></span></div>
    <div class="hcell v" style="grid-column:4; grid-row:1;">Cartesian Workspace Vector&nbsp;<span class="hm" data-tex="\tau"></span></div>

    <div class="grp" style="grid-column:1; grid-row:2;">SO(2)</div>
    <div class="tan" id="tan2" style="grid-column:2; grid-row:2;"></div>
    <div class="cart" style="grid-column:4; grid-row:2;"><div class="vec"><div class="vcol">
      <input id="th" type="number" step="0.1" value="0.8">
    </div></div></div>

    <div class="grp" style="grid-column:1; grid-row:3;">SO(3)</div>
    <div class="tan" id="tan3" style="grid-column:2; grid-row:3;"></div>
    <div class="cart" style="grid-column:4; grid-row:3;"><div class="vec"><div class="vcol">
      <input id="wx" type="number" step="0.1" value="0.4">
      <input id="wy" type="number" step="0.1" value="-0.7">
      <input id="wz" type="number" step="0.1" value="1.2">
    </div></div></div>

    <div class="iso" style="grid-column:3; grid-row:2 / span 2;">
      <div class="opgrp h"><span class="opnm"><b>(·)<sup>∧</sup></b></span><span class="ar">⟵</span></div>
      <div class="opgrp v"><span class="opnm"><b>(·)<sup>∨</sup></b></span><span class="ar">⟶</span></div>
    </div>
  </div>
  <div class="hint">drag the numbers left/right (or click and type) — the tangent-space element on the left updates directly</div>

<script>
  const thEl = document.getElementById('th'), wxEl = document.getElementById('wx'),
        wyEl = document.getElementById('wy'), wzEl = document.getElementById('wz');
  const tan2 = document.getElementById('tan2'), tan3 = document.getElementById('tan3');
  function num(x){ const v = parseFloat(x); return isNaN(v) ? 0 : v; }
  function render() {
    if (!window.katex) return;
    const th = num(thEl.value);
    katex.render(`${th.toFixed(2)}\\,i`, tan2, { displayMode: true, throwOnError: false });
    const wx = num(wxEl.value), wy = num(wyEl.value), wz = num(wzEl.value);
    const m = `\\begin{bmatrix}` +
      ` 0 & ${(-wz).toFixed(2)} & ${wy.toFixed(2)} \\\\` +
      ` ${wz.toFixed(2)} & 0 & ${(-wx).toFixed(2)} \\\\` +
      ` ${(-wy).toFixed(2)} & ${wx.toFixed(2)} & 0 \\end{bmatrix}`;
    katex.render(m, tan3, { displayMode: true, throwOnError: false });
  }
  [thEl, wxEl, wyEl, wzEl].forEach(el => el.addEventListener('input', render));

  // horizontal drag to scrub the value (a quick click still focuses for typing)
  function addScrub(el, sens, min, max) {
    let s = null;
    el.addEventListener('pointerdown', e => { s = { x: e.clientX, v: num(el.value), moved: false, id: e.pointerId }; });
    el.addEventListener('pointermove', e => {
      if (!s) return;
      if (!s.moved && Math.abs(e.clientX - s.x) < 3) return;
      if (!s.moved) { s.moved = true; el.setPointerCapture(s.id); el.blur(); }
      e.preventDefault();
      let v = s.v + (e.clientX - s.x) * sens;
      el.value = Math.max(min, Math.min(max, v)).toFixed(2);
      render();
    });
    const end = () => { if (s && s.moved) { try { el.releasePointerCapture(s.id); } catch (_) {} } s = null; };
    el.addEventListener('pointerup', end);
    el.addEventListener('pointercancel', end);
  }
  [thEl, wxEl, wyEl, wzEl].forEach(el => addScrub(el, 0.01, -3, 3));

  function renderHeaders(){
    document.querySelectorAll('.hm').forEach(el => {
      if (window.katex) { try { katex.render(el.dataset.tex, el, { throwOnError:false }); } catch(e){} }
    });
  }
  window.addEventListener('DOMContentLoaded', () => { render(); renderHeaders(); });
  render(); renderHeaders();
</script>
</body>
</html>
